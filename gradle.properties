# Memoria y comportamiento de Gradle.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# Fabric Loom aun recomienda dejar la configuration cache desactivada en proyectos base.
org.gradle.configuration-cache=false

# Gradle toolchains: deja que Gradle detecte JDKs instalados y prioriza el JDK 25 local si existe.
# Si mueves el proyecto a otro PC, cambia esta ruta o configura Gradle JVM en IntelliJ.
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.paths=C:/Program Files/Apache NetBeans/jdk

# Fabric Properties
# Revisa versiones compatibles en https://fabricmc.net/develop o Fabric Template Generator.
minecraft_version=26.1.2

# Minecraft 26.1+ ya no usa Yarn mappings: Mojang publico el juego sin ofuscacion.
# Mantengo esta propiedad por compatibilidad con proyectos 1.21.11 o anteriores.
yarn_mappings=

loader_version=0.19.2
loom_version=1.16.2
kotlin_version=2.3.21
fabric_version=0.149.0+26.1.2
fabric_kotlin_version=1.13.11+kotlin.2.3.21

# Mod Properties
mod_version=1.7.0
maven_group=com.ditoxsoft
archives_base_name=RiserJuices
